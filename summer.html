<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summer Enrollment — CoRadix Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <style>
        :root { --ink: #1c1c1e; --muted: #6b7280; --border: #e5e7eb; --bg: #ffffff; --bg-soft: #f5f7fa; --blue: #0057ff; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
        
        /* Navbar - Change 'fixed' to 'absolute' if you want it to move with the page */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; height: 64px; background: rgba(255,255,255,0.96); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .nav-logo { font-weight: 700; text-decoration: none; color: var(--ink); }
        .nav-logo span { color: var(--blue); }
        .nav-back { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-decoration: none; }

        .page { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; padding-top: 64px; }
        
        .left-panel { background: var(--ink); color: white; padding: 4rem 4vw; display: flex; flex-direction: column; justify-content: center; position: sticky; top: 64px; height: calc(100vh - 64px); }
        .left-panel h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 3.5vw, 3rem); line-height: 1.1; margin-bottom: 1rem; }
        .left-panel h1 em { font-style: italic; color: #ffab00; } /* Gold accent for summer */
        .left-panel p { color: rgba(255,255,255,0.5); line-height: 1.6; }

        .right-panel { background: var(--bg-soft); padding: 4rem 4vw; display: flex; flex-direction: column; }
        .gform-container { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        iframe { width: 100%; height: 900px; border: none; }

        @media (max-width: 900px) { .page { grid-template-columns: 1fr; } .left-panel { position: static; height: auto; } }
    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="index.html">CoRadix<span>Academy</span></a>
        <a href="index.html" class="nav-back">← Back to Home</a>
    </nav>

    <div class="page">
        <div class="left-panel">
            <p style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em; color: #ffab00; margin-bottom: 1rem;">Limited Enrollment</p>
            <h1>Summer<br/><em>2026.</em></h1>
            <p>Join our intensive summer cohort. Experience our signature M·U·P approach in an accelerated format designed for rapid growth.</p>
        </div>

        <div class="right-panel">
            <div class="form-header" style="margin-bottom: 2rem;">
                <h2 style="font-family: 'DM Serif Display'; font-size: 1.8rem;">Summer Enrollment</h2>
                <p style="color: var(--muted); font-size: 0.9rem;">Please complete the details below to reserve your spot.</p>
            </div>
            <div class="gform-container">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1mhdfujl9xJFaDclNgn3luBEADLke58v9sscmrBncTNJv7Q/viewform?usp=pp_url&entry.1677925529=xxx&entry.315133776=xxxx&entry.1270484895=xxxxx&entry.467362466=xxxxx&entry.218350618=xxxxxxx&embedded=true">Loading…</iframe>
            </div>
        </div>
    </div>
</body>
</html>
