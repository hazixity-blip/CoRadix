<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Enrollment | CoRadix</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; }
        .split-container { display: grid; grid-template-columns: 1fr 1.2fr; min-height: 100vh; }
        .left-content { padding: 4rem; display: flex; flex-direction: column; justify-content: center; background: #0057ff; color: white; }
        .right-form { position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { color: rgba(255,255,255,0.8); text-decoration: none; margin-bottom: 2rem; display: block; }
        @media (max-width: 850px) { .split-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="left-content">
            <a href="index.html" class="back-btn">← Exit Enrollment</a>
            <h1 style="font-size: 3rem; margin-bottom: 1.5rem;">Summer 2026<br>Enrollment</h1>
            <p style="opacity: 0.9; line-height: 1.6;">Secure your spot in our upcoming summer cohort. Please provide your details in the form to the right to begin the process.</p>
        </div>
        <div class="right-form">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScy2LzYg0T0k2D_example_summer/viewform?embedded=true">Loading…</iframe>
        </div>
    </div>
</body>
</html>
